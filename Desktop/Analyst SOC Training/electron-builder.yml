appId: com.soc.analyst-training
productName: Analyst SOC Training
copyright: Copyright © 2026

publish:
  provider: github
  owner: Emixee
  repo: analyst-soc-training
  private: false

directories:
  output: release
  buildResources: public

files:
  - out/**/*
  - package.json

extraResources:
  - from: public/
    to: public/
    filter: "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Analyst SOC Training
  installerIcon: public/icon.ico
  uninstallerIcon: public/icon.ico
  installerHeaderIcon: public/icon.ico
  deleteAppDataOnUninstall: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: public/icon.png
  category: Education
  description: Formation complète Analyste SOC
